<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sanctuary — Signing you in</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fbf9f4;
      font-family: Georgia, serif;
      text-align: center;
      padding: 40px 24px;
    }
    .logo { color: #50644b; font-size: 20px; font-style: italic; margin-bottom: 32px; }
    h1 { color: #31332e; font-size: 24px; margin-bottom: 8px; font-weight: normal; }
    p { color: #5e6059; font-size: 14px; line-height: 1.6; max-width: 300px; margin: 8px auto; }
    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 18px 48px;
      background-color: #50644b;
      color: #eaffe1;
      border-radius: 9999px;
      text-decoration: none;
      font-family: Helvetica, sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .spinner {
      margin: 24px auto;
      width: 32px; height: 32px;
      border: 3px solid #50644b33;
      border-top-color: #50644b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #ready { display: none; }
    #error { display: none; color: #a73b21; margin-top: 20px; }
  </style>
</head>
<body>
  <p class="logo">The Sanctuary</p>

  <div id="loading">
    <h1>Signing you in...</h1>
    <div class="spinner"></div>
  </div>

  <div id="ready">
    <h1>You're signed in!</h1>
    <p>Tap the button below to return to the app.</p>
    <a id="openApp" href="#" class="btn">Open The Sanctuary</a>
  </div>

  <div id="error">
    <h1>Something went wrong</h1>
    <p>Authentication failed. Please go back to the app and try again.</p>
  </div>

  <script>
    (function() {
      var hash = window.location.hash.substring(1);
      if (!hash) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        return;
      }

      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');

      if (!accessToken || !refreshToken) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        return;
      }

      // Build deep link with tokens as query params (Android preserves these)
      var deepLink = 'com.sanctuary.app://login?access_token=' +
        encodeURIComponent(accessToken) +
        '&refresh_token=' + encodeURIComponent(refreshToken);

      // Set the button
      document.getElementById('openApp').href = deepLink;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('ready').style.display = 'block';

      // Try automatic redirect (works on some devices)
      window.location.href = deepLink;
    })();
  </script>
</body>
</html>
