
[functions.reset-password-redirect]
enabled = true
verify_jwt = true
import_map = "./functions/reset-password-redirect/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/reset-password-redirect/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/reset-password-redirect/*.html" ]

# Stripe webhook MUST run without JWT verification — Stripe doesn't carry a
# Supabase JWT, it carries its own `Stripe-Signature` header which the
# function verifies internally. Setting verify_jwt = false here is the
# only way Stripe deliveries can reach the function.
[functions.stripe-webhook]
enabled = true
verify_jwt = false
entrypoint = "./functions/stripe-webhook/index.ts"

# Customer Portal session creator — called by a signed-in user from the
# Settings screen. JWT verification ON so anonymous callers can't mint
# portal sessions; the function additionally checks the JWT inside to
# look up the user's stripe_customer_id and refuses if absent.
[functions.create-customer-portal-session]
enabled = true
verify_jwt = true
entrypoint = "./functions/create-customer-portal-session/index.ts"
